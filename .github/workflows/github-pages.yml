# Buduje aplikację i publikuje katalog dist na GitHub Pages.
#
# Po pierwszym pushu: Repo → Settings → Pages → Build and deployment → Source: „GitHub Actions”.
#
# Jeden job (build + upload + deploy): unika błędu „Multiple artifacts named github-pages”
# przy retry finalizacji uploadu (actions/upload-pages-artifact#97).
#
# Adres strony (zwykle): https://<user>.github.io/<repo>/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.repository }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript (jsconfig)
        run: npm run typecheck

      - name: Vitest
        run: npm run test:run

      - name: Build (Vite + copy-spa-404.mjs → 404.html)
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deploy
