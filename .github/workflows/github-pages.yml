# Buduje aplikację i publikuje katalog dist na GitHub Pages.
#
# Po pierwszym pushu: Repo → Settings → Pages → Build and deployment → Source: „GitHub Actions”.
#
# Adres strony (zwykle): https://<user>.github.io/<repo>/
# Jeśli repozytorium nazywa się <user>.github.io (strona główna użytkownika), ustaw poniżej VITE_BASE_PATH na "/"
# (zamiast /${{ github.event.repository.name }}/).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript (jsconfig)
        run: npm run typecheck

      - name: Vitest
        run: npm run test:run

      - name: Build (Vite + copy-spa-404.mjs → 404.html)
        run: npm run build
        env:
          # Ścieżka pod którą GitHub Pages serwuje projekt (nie user.github.io root)
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
